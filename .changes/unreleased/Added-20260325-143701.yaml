kind: Added
body: 'HTTP/2 startup warmup: bundles can now declare server.warmup: [''https://upstream:port''] in their server config to pre-establish HTTP/2 sessions at startup. Warmup fires after bundle start, sends an initial PING to verify connectivity, then starts the 5s keepalive cycle — so the first real request reuses a live session instead of cold-connecting (#H5)'
