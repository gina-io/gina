<script>
(function () {
    'use strict';
    var d = window.__ginaData;
    if (!d || !d.user) return;
    var env     = d.user.environment || {};
    var data    = d.user.data        || {};
    var bundle  = env.bundle  || '?';
    var envName = env.env     || '?';
    var dot     = data.error  ? '#e74c3c' : '#2ecc71';

    // ── ginaToolbar shim ──────────────────────────────────────────────────
    // gina.min.js is a stale build that creates its own window.ginaToolbar
    // with a loadData function that accesses removed DOM elements
    // (#gina-toolbar-json). We use Object.defineProperty to lock our shim
    // so gina.min.js cannot overwrite it on DOMContentLoaded.
    var _origData = null;
    var _shim = {
        update: function (section, sectionData) {
            if (!window.__ginaData) return;
            var u = window.__ginaData.user;
            var g = window.__ginaData.gina;
            if (!u || !g) return;

            // Save original state for restore (once)
            if (!_origData) {
                try { _origData = JSON.parse(JSON.stringify({ data: u.data, view: u.view })); } catch (e) {}
            }

            if (section === 'data-xhr' || section === 'view-xhr') {
                if (sectionData) {
                    u[section] = sectionData;
                    g[section] = sectionData;
                } else {
                    delete u[section];
                    delete g[section];
                }
            } else if (section === 'el-xhr') {
                u['el-xhr'] = sectionData;
            } else if (section === 'forms') {
                if (typeof sectionData === 'object' && sectionData !== null) {
                    if (!u.forms) u.forms = {};
                    var fk = Object.keys(sectionData);
                    for (var i = 0; i < fk.length; i++) u.forms[fk[i]] = sectionData[fk[i]];
                }
            }

            // Sync localStorage for the Inspector's fallback channel
            try { localStorage.setItem('__ginaData', JSON.stringify(window.__ginaData)); } catch (e) {}
        },
        restore: function () {
            if (!window.__ginaData) return;
            var u = window.__ginaData.user;
            if (!u) return;
            delete u['data-xhr'];
            delete u['view-xhr'];
            delete u['el-xhr'];
            if (_origData) {
                try {
                    u.data = JSON.parse(JSON.stringify(_origData.data));
                    u.view = JSON.parse(JSON.stringify(_origData.view));
                } catch (e) {}
            }
            try { localStorage.setItem('__ginaData', JSON.stringify(window.__ginaData)); } catch (e) {}
        },
        hasParsedUrls: false
    };

    // Lock with defineProperty — gina.min.js DOMContentLoaded init will
    // try window.ginaToolbar = new GinaToolbar() which triggers our setter
    // that silently absorbs the assignment while preserving our update/restore.
    try {
        Object.defineProperty(window, 'ginaToolbar', {
            get: function () { return _shim; },
            set: function (v) {
                // Absorb gina.min.js's assignment without overwriting shim
                if (v && typeof v === 'object') {
                    var keys = Object.keys(v);
                    for (var i = 0; i < keys.length; i++) {
                        var k = keys[i];
                        if (k !== 'update' && k !== 'restore') {
                            _shim[k] = v[k];
                        }
                    }
                }
            },
            configurable: true,
            enumerable: true
        });
    } catch (e) {
        window.ginaToolbar = _shim;
    }

    // Publish data for Inspector via localStorage (works regardless of opener)
    try { localStorage.setItem('__ginaData', JSON.stringify(d)); } catch (e) {}
    var webroot = env.webroot || '/';
    if (webroot.charAt(webroot.length - 1) !== '/') webroot += '/';
    var el      = document.createElement('div');
    el.id       = '__gina-statusbar';
    var sr      = el.attachShadow({ mode: 'open' });
    sr.innerHTML = '<style>'
        + '#b { position: fixed; bottom: 0; right: 0; z-index: 2147483647;'
        + '  display: flex; align-items: center; gap: 6px;'
        + '  padding: 3px 8px; font: 11px/1.4 monospace;'
        + '  background: rgba(0,0,0,.75); color: #eee;'
        + '  border-radius: 4px 0 0 0; cursor: default; }'
        + '.d { width: 8px; height: 8px; border-radius: 50%;'
        + '  flex-shrink: 0; background: ' + dot + '; }'
        + 'a { color: #adf; text-decoration: none; }'
        + 'a:hover { text-decoration: underline; }'
        + '</style>'
        + '<div id="b">'
        + '<span class="d"></span>'
        + '<span>' + bundle + '@' + envName + '</span>'
        + '<a href="' + webroot + '_gina/inspector/" target="_blank" rel="opener">Inspector &#8599;</a>'
        + '</div>';
    function inject() {
        if (document.body) document.body.appendChild(el);
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', inject);
    } else {
        inject();
    }
}());
</script>
