<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inspector</title>
  <link rel="stylesheet" href="inspector.css">
</head>
<body>

  <!-- ── Header ── -->
  <header id="bm-header">
    <div class="bm-brand">
      <button class="bm-settings-btn" id="bm-settings-toggle" aria-label="Settings">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M29.667,18.098l0,-4.555l-4.879,0c-0.214,-0.827 -0.542,-1.604 -0.968,-2.321l3.455,-3.456l-3.221,-3.221l-3.455,3.456c-0.718,-0.426 -1.494,-0.754 -2.321,-0.968l0,-4.879l-4.556,0l0,4.879c-0.827,0.214 -1.603,0.542 -2.321,0.968l-3.455,-3.456l-3.221,3.221l3.455,3.456c-0.426,0.717 -0.754,1.494 -0.968,2.321l-4.879,0l0,4.555l4.879,0c0.214,0.827 0.542,1.604 0.968,2.321l-3.455,3.456l3.221,3.22l3.455,-3.455c0.718,0.426 1.494,0.754 2.321,0.968l0,4.879l4.556,0l0,-4.879c0.827,-0.214 1.603,-0.542 2.321,-0.968l3.455,3.455l3.221,-3.22l-3.455,-3.456c0.426,-0.717 0.754,-1.492 0.968,-2.321l4.879,0ZM16,20.376c-2.512,0 -4.556,-2.043 -4.556,-4.556c0,-2.51 2.044,-4.555 4.556,-4.555c2.512,0 4.556,2.045 4.556,4.555c0,2.513 -2.044,4.556 -4.556,4.556Z"/></svg>
      </button>
    </div>
    <nav class="bm-tabs" aria-label="Main tabs">
      <button class="bm-tab active" data-tab="data">
        <svg class="bm-tab-icon" viewBox="0 0 16 16"><path d="M6 2H4.5C3.67 2 3 2.67 3 3.5V6c0 .55-.45 1-1 1v2c.55 0 1 .45 1 1v2.5c0 .83.67 1.5 1.5 1.5H6v-1.5H5V11c0-.83-.37-1.58-.96-2.08a.25.25 0 010-.34l.02-.02c.03-.03.06-.07.1-.1A2.49 2.49 0 005 6.5V4h1V2z" fill="currentColor"/><path d="M10 2h1.5c.83 0 1.5.67 1.5 1.5V6c0 .55.45 1 1 1v2c-.55 0-1 .45-1 1v2.5c0 .83-.67 1.5-1.5 1.5H10v-1.5h1V11c0-.83.37-1.58.96-2.08a.25.25 0 000-.34l-.02-.02a1.5 1.5 0 01-.1-.1A2.49 2.49 0 0011 6.5V4h-1V2z" fill="currentColor"/></svg>
        Data</button>
      <button class="bm-tab" data-tab="view">
        <svg class="bm-tab-icon" viewBox="0 0 16 16"><path d="M8 3C3.6 3 .5 7.4.3 7.7a.5.5 0 000 .6C.5 8.6 3.6 13 8 13s7.5-4.4 7.7-4.7a.5.5 0 000-.6C15.5 7.4 12.4 3 8 3zm0 8.5C5 11.5 2.4 9 1.4 8 2.4 7 5 4.5 8 4.5s5.6 2.5 6.6 3.5c-1 1-3.6 3.5-6.6 3.5zM8 6a2 2 0 100 4 2 2 0 000-4z"/></svg>
        View</button>
      <button class="bm-tab" data-tab="forms">
        <svg class="bm-tab-icon" viewBox="0 0 16 16"><path d="M3 2.5A1.5 1.5 0 014.5 1h7A1.5 1.5 0 0113 2.5v11a1.5 1.5 0 01-1.5 1.5h-7A1.5 1.5 0 013 13.5v-11zM4.5 2a.5.5 0 00-.5.5v11a.5.5 0 00.5.5h7a.5.5 0 00.5-.5v-11a.5.5 0 00-.5-.5h-7zM5 5h6v1H5V5zm0 3h6v1H5V8zm0 3h4v1H5v-1z"/></svg>
        Forms</button>
      <button class="bm-tab" data-tab="query">
        <svg class="bm-tab-icon" viewBox="0 0 16 16"><path d="M8 1C4.7 1 2 2.3 2 4v8c0 1.7 2.7 3 6 3s6-1.3 6-3V4c0-1.7-2.7-3-6-3zM8 2.5c2.8 0 4.5 1 4.5 1.5S10.8 5.5 8 5.5 3.5 4.5 3.5 4 5.2 2.5 8 2.5zM3.5 6.3C4.6 7 6.2 7.5 8 7.5s3.4-.5 4.5-1.2V8c0 .5-1.7 1.5-4.5 1.5S3.5 8.5 3.5 8V6.3zm0 4C4.6 11 6.2 11.5 8 11.5s3.4-.5 4.5-1.2V12c0 .5-1.7 1.5-4.5 1.5S3.5 12.5 3.5 12v-1.7z"/></svg>
        Query<span class="bm-tab-badge hidden" id="bm-query-tab-badge"></span></button>
      <button class="bm-tab" data-tab="logs">
        <svg class="bm-tab-icon" viewBox="0 0 16 16"><path d="M2 2.5A1.5 1.5 0 013.5 1h9A1.5 1.5 0 0114 2.5v11a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 13.5v-11zM3.5 2a.5.5 0 00-.5.5v11a.5.5 0 00.5.5h9a.5.5 0 00.5-.5v-11a.5.5 0 00-.5-.5h-9zM5 5l2 1.5L5 8V5zm3.5 1.5a.5.5 0 01.5-.5h2a.5.5 0 010 1H9a.5.5 0 01-.5-.5zM5 10h6v1H5v-1z"/></svg>
        Logs<span class="bm-log-dot" id="bm-log-dot"></span></button>
    </nav>
    <div class="bm-target">
      <span class="bm-dot" id="bm-dot"></span>
      <span id="bm-label">connecting&#x2026;</span>
    </div>
    <div class="bm-header-end">
      <label class="bm-toggle" id="bm-theme-toggle" title="Dark / Light mode">
        <input type="checkbox" id="bm-theme-cb">
        <span class="bm-toggle-track">
          <span class="bm-toggle-sun">&#9788;</span>
          <span class="bm-toggle-moon">&#9790;</span>
        </span>
      </label>
    </div>
  </header>

  <!-- ── Settings panel ── -->
  <div id="bm-settings" class="bm-settings hidden">
    <div class="bm-settings-row">
      <label>
        <span>Poll interval</span>
        <select id="bm-poll-interval">
          <option value="500">0.5s</option>
          <option value="1000">1s</option>
          <option value="2000" selected>2s</option>
          <option value="5000">5s</option>
        </select>
      </label>
      <label>
        <input type="checkbox" id="bm-auto-expand"> Auto-expand all
      </label>
    </div>
    <!-- Memory gauge -->
    <div class="bm-mem-row" id="bm-mem-row" style="display:none">
      <span class="bm-mem-label">Memory</span>
      <div class="bm-mem-bar-wrap">
        <div class="bm-mem-bar" id="bm-mem-bar"></div>
      </div>
      <span class="bm-mem-text" id="bm-mem-text"></span>
    </div>
    <!-- Environment info (different bg, resizable) -->
    <div class="bm-settings-env-wrap" id="bm-settings-env-wrap">
      <div class="bm-settings-env" id="bm-settings-env"></div>
      <div class="bm-resize-handle" id="bm-env-resize" title="Drag to resize">&#x2261;</div>
    </div>
  </div>

  <!-- ── Data tab ── -->
  <section id="tab-data" class="bm-panel active" aria-label="Data">
    <div class="bm-toolbar-controls" id="bm-data-controls">
      <input id="bm-data-search" type="search" class="bm-data-search" placeholder="Search&#x2026; e.g. document.company.id" aria-label="Search data by path">
      <button class="bm-icon-btn" id="bm-fold-all" title="Fold / Unfold all">
        <svg viewBox="0 0 16 16"><path d="M1 3.5A1.5 1.5 0 012.5 2h11A1.5 1.5 0 0115 3.5v1A1.5 1.5 0 0113.5 6h-11A1.5 1.5 0 011 4.5v-1zM2.5 3a.5.5 0 00-.5.5v1a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-1a.5.5 0 00-.5-.5h-11zM1 9.5A1.5 1.5 0 012.5 8h11A1.5 1.5 0 0115 9.5v1a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 10.5v-1zM2.5 9a.5.5 0 00-.5.5v1a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-1a.5.5 0 00-.5-.5h-11z"/></svg>
      </button>
      <button class="bm-icon-btn" id="bm-raw" title="Toggle RAW JSON view">
        <svg viewBox="0 0 16 16"><path d="M5.854 4.854a.5.5 0 10-.708-.708l-3.5 3.5a.5.5 0 000 .708l3.5 3.5a.5.5 0 00.708-.708L2.707 8l3.147-3.146zm4.292 0a.5.5 0 01.708-.708l3.5 3.5a.5.5 0 010 .708l-3.5 3.5a.5.5 0 01-.708-.708L13.293 8l-3.147-3.146z"/></svg>
      </button>
      <button class="bm-icon-btn" id="bm-download" title="Download as JSON">
        <svg viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 01.5.5v2.5a1 1 0 001 1h12a1 1 0 001-1v-2.5a.5.5 0 011 0v2.5a2 2 0 01-2 2H2a2 2 0 01-2-2v-2.5a.5.5 0 01.5-.5z"/><path d="M7.646 11.854a.5.5 0 00.708 0l3-3a.5.5 0 00-.708-.708L8.5 10.293V1.5a.5.5 0 00-1 0v8.793L5.354 8.146a.5.5 0 10-.708.708l3 3z"/></svg>
      </button>
    </div>
    <div class="bm-scroll-area" data-tab="data">
      <div class="bm-tree-root" id="tree-data"></div>
    </div>
  </section>

  <!-- ── View tab ── -->
  <section id="tab-view" class="bm-panel" aria-label="View">
    <div class="bm-scroll-area" data-tab="view">
      <div class="bm-tree-root" id="tree-view"></div>
    </div>
  </section>

  <!-- ── Forms tab ── -->
  <section id="tab-forms" class="bm-panel" aria-label="Forms">
    <div class="bm-scroll-area" data-tab="forms">
      <div class="bm-tree-root" id="tree-forms"></div>
    </div>
  </section>

  <!-- ── Query tab ── -->
  <section id="tab-query" class="bm-panel" aria-label="Query">
    <div class="bm-query-controls">
      <select id="bm-query-lang" aria-label="Language filter">
        <option value="">All languages</option>
      </select>
      <select id="bm-query-connector" aria-label="Connector filter">
        <option value="">All connectors</option>
      </select>
      <select id="bm-query-bundle" aria-label="Bundle filter">
        <option value="">All bundles</option>
      </select>
      <span class="bm-query-stats hidden" id="bm-query-stats">
        <span class="bm-query-stat" id="bm-query-total-weight"></span>
        <span class="bm-query-stat" id="bm-query-total-time"></span>
      </span>
    </div>
    <div class="bm-query-search-bar">
      <input id="bm-query-search" type="search" placeholder="Search&#x2026;" aria-label="Search queries">
    </div>
    <div class="bm-scroll-area" data-tab="query">
      <div class="bm-tree-root" id="tree-query"></div>
    </div>
  </section>

  <!-- ── Logs tab ── -->
  <section id="tab-logs" class="bm-panel" aria-label="Logs">
    <div class="bm-logs-controls">
      <select id="bm-log-source" aria-label="Source filter">
        <option value="">All sources</option>
        <option value="client">Client</option>
        <option value="server">Server</option>
      </select>
      <select id="bm-log-level" aria-label="Level filter">
        <option value="">All levels</option>
      </select>
      <input id="bm-log-search" type="search" placeholder="Search&#x2026;" aria-label="Search logs">
      <button id="bm-log-pause"  class="bm-btn">&#x23F8; Pause</button>
      <button id="bm-log-clear"  class="bm-btn">Clear</button>
    </div>
    <div class="bm-logs-body">
      <div class="bm-log-sel-hud">
        <span id="bm-log-sel-badge" class="bm-log-sel-badge hidden"><button id="bm-log-sel-cancel" class="bm-log-sel-cancel">&#x2715;</button><button id="bm-log-sel-copy" class="bm-log-sel-copy">Copy 0</button></span>
        <button id="bm-log-help-btn" class="bm-log-help-btn" aria-label="Selection shortcuts">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 3a1 1 0 110 2 1 1 0 010-2zm-.5 3.5h1a.5.5 0 01.5.5v4a.5.5 0 01-1 0V8.5h-.5a.5.5 0 010-1z"/></svg>
        </button>
        <div id="bm-log-help-pop" class="bm-log-help-pop" role="tooltip">
          <div class="bm-log-help-row"><span class="bm-log-help-keys"><kbd>Click</kbd></span><span>Copy row</span></div>
          <div class="bm-log-help-row"><span class="bm-log-help-keys"><kbd>Shift</kbd> + <kbd>Click</kbd></span><span>Range select</span></div>
          <div class="bm-log-help-row"><span class="bm-log-help-keys"><kbd>&#x2318;</kbd>/<kbd>Ctrl</kbd> + <kbd>Click</kbd></span><span>Toggle row</span></div>
          <div class="bm-log-help-row"><span class="bm-log-help-keys"><kbd>&#x2318;</kbd>/<kbd>Ctrl</kbd> + <kbd>C</kbd></span><span>Copy selected</span></div>
          <div class="bm-log-help-row"><span class="bm-log-help-keys"><kbd>Esc</kbd></span><span>Deselect all</span></div>
        </div>
      </div>
      <div id="bm-log-list" class="bm-log-list" role="log" aria-live="polite"></div>
    </div>
  </section>

  <!-- ── Scroll navigation buttons ── -->
  <div id="bm-scroll-nav" class="bm-scroll-nav">
    <button id="bm-scroll-top" class="bm-scroll-btn hidden" title="Scroll to top" aria-label="Scroll to top">
      <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 4.35l-4.15 4.15a.5.5 0 00.7.7L8 5.77l3.45 3.43a.5.5 0 00.7-.7L8 4.35z"/></svg>
    </button>
    <button id="bm-scroll-bottom" class="bm-scroll-btn hidden" title="Scroll to bottom" aria-label="Scroll to bottom">
      <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 11.65l4.15-4.15a.5.5 0 00-.7-.7L8 10.23 4.55 6.8a.5.5 0 00-.7.7L8 11.65z"/></svg>
    </button>
  </div>

  <!-- ── Loading overlay ── -->
  <div id="bm-loader" class="bm-loader hidden">
    <div class="bm-spinner"></div>
  </div>

  <!-- ── No-source overlay ── -->
  <div id="bm-no-source" class="bm-overlay hidden" role="alert">
    <div class="bm-overlay-box">
      <p class="bm-overlay-icon" aria-hidden="true">&#x2B21;</p>
      <h2>No source connected</h2>
      <p>Open Inspector by clicking the <strong>Inspector &#x2197;</strong> link in the status bar of a running Gina bundle (dev mode).</p>
    </div>
  </div>

  <!-- ── Download modal ── -->
  <div id="bm-dl-modal" class="bm-overlay hidden">
    <div class="bm-dl-box">
      <h3>Download JSON</h3>
      <div id="bm-dl-checks" class="bm-dl-checks"></div>
      <div class="bm-dl-actions">
        <button class="bm-btn" id="bm-dl-cancel">Cancel</button>
        <button class="bm-btn bm-btn-accent" id="bm-dl-confirm">Download</button>
      </div>
    </div>
  </div>

  <!-- ── Scroll progress bar (fixed bottom) ── -->
  <div id="bm-scroll-progress" class="bm-scroll-progress"></div>

  <script src="inspector.js"></script>
</body>
</html>
